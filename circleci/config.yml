version: 2.1

executors:
  docker-executor:
    docker:
      - image: google/cloud-sdk:latest
    working_directory: ~/repo

jobs:
  checkout_code:
    executor: docker-executor
    steps:
      - checkout

  build_docker_image:
    executor: docker-executor
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.17
      - run:
          name: Authenticate to Google Cloud
          command: |
            echo $GCP_CREDENTIALS > ${HOME}/gcp-key.json
            gcloud auth activate-service-account --key-file=${HOME}/gcp-key.json
            gcloud config set project $GCP_PROJECT_ID
      - run:
          name: Build and push Docker image
          command: |
            docker build -t us-central1-docker.pkg.dev/$GCP_PROJECT_ID/mlops-app/mlops-app:latest .
            docker push us-central1-docker.pkg.dev/$GCP_PROJECT_ID/mlops-app/mlops-app:latest

  deploy_to_gke:
    executor: docker-executor
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.17
      - run:
          name: Authenticate to Google Cloud
          command: |
            echo $GCP_CREDENTIALS > ${HOME}/gcp-key.json
            gcloud auth activate-service-account --key-file=${HOME}/gcp-key.json
            gcloud config set project $GCP_PROJECT_ID
      - run:
          name: Configure GKE
          command: |
            gcloud container clusters get-credentials $GKE_CLUSTER_NAME --zone $GKE_CLUSTER_ZONE --project $GCP_PROJECT_ID
            kubectl apply -f manifests/kubernates_deployment.yaml

      - run:
          name: Deploy to GKE
          command: |
            kubectl apply -f kubernetes-deployment.yaml

workflows:
  version : 2
  build-and-deploy:
    jobs:
      - checkout_code
      - build_docker_image:
          requires: [checkout_code]
      - deploy_to_gke:
          requires: [build_docker_image]
